<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Pengurusan Kalendar & Aktiviti</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Gaya CSS Khas (Tema Khas Sudut Bulat & Cetakan) -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Tahoma&display=swap');
    
    body { margin: 0; font-family: 'Tahoma', 'Trebuchet MS', sans-serif; }
    .xp-desktop { background-color: #3A6EA5; min-height: 100vh; }
    
    .xp-window { 
      background-color: #ECE9D8; 
      border: 1px solid #003C74; 
      border-radius: 12px; 
      box-shadow: 2px 2px 12px rgba(0,0,0,0.4); 
    }
    
    .xp-titlebar { 
      background: linear-gradient(to bottom, #0058E6 0%, #3A93FF 8%, #288EFF 40%, #127DFF 88%, #036BFF 100%); 
      color: white; 
      padding: 6px 14px; 
      border-top-left-radius: 11px; 
      border-top-right-radius: 11px; 
      border-bottom: 1px solid #003C74; 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      font-weight: bold; 
      text-shadow: 1px 1px #0F1089; 
      letter-spacing: 0.5px; 
    }
    
    .xp-button { 
      background-color: #ECE9D8; 
      border-top: 2px solid #FFFFFF; 
      border-left: 2px solid #FFFFFF; 
      border-right: 2px solid #716F64; 
      border-bottom: 2px solid #716F64; 
      border-radius: 6px;
      padding: 4px 12px; 
      font-size: 11px; 
      color: #000; 
      display: inline-flex; 
      align-items: center; 
      justify-content: center;
      gap: 6px; 
      cursor: pointer; 
      font-family: 'Tahoma', sans-serif;
      transition: all 0.1s ease;
    }
    .xp-button:active:not(:disabled) { 
      border-top: 2px solid #716F64; 
      border-left: 2px solid #716F64; 
      border-right: 2px solid #FFFFFF; 
      border-bottom: 2px solid #FFFFFF; 
      padding: 5px 11px 3px 13px; 
    }
    .xp-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .xp-button-mini { 
      background-color: #ECE9D8; 
      border-top: 1px solid #FFFFFF; 
      border-left: 1px solid #FFFFFF; 
      border-right: 1px solid #716F64; 
      border-bottom: 1px solid #716F64; 
      border-radius: 4px;
    }
    .xp-button-mini:active:not(:disabled) { 
      border-top: 1px solid #716F64; 
      border-left: 1px solid #716F64; 
      border-right: 1px solid #FFFFFF; 
      border-bottom: 1px solid #FFFFFF; 
    }
    
    .xp-panel { 
      border-top: 2px solid #716F64; 
      border-left: 2px solid #716F64; 
      border-right: 2px solid #FFFFFF; 
      border-bottom: 2px solid #FFFFFF; 
      border-radius: 10px;
      background-color: #ECE9D8; 
    }
    
    .xp-input { 
      border-top: 2px solid #716F64; 
      border-left: 2px solid #716F64; 
      border-right: 2px solid #FFFFFF; 
      border-bottom: 2px solid #FFFFFF; 
      border-radius: 6px;
      padding: 6px 10px; 
      font-family: 'Tahoma', sans-serif; 
      outline: none; 
    }
    .xp-input:focus { background-color: #ffffe1; }
    .xp-input:disabled { background-color: #e2e8f0; color: #94a3b8; cursor: not-allowed; }
    
    .monthly-print-only { display: none; }
    
    .tab-btn {
      padding: 6px 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: bold;
      border-top: 2px solid #ece9d8;
      border-left: 2px solid #ece9d8;
      border-right: 2px solid #ece9d8;
      border-top-left-radius: 8px;
      border-top-right-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .tab-btn.active {
      background-color: white;
      border-top: 2px solid #fff;
      border-left: 2px solid #fff;
      border-right: 2px solid #fff;
      border-bottom: 0;
      box-shadow: 1px -1px 3px rgba(0,0,0,0.1);
      margin-bottom: -15px;
      padding-bottom: 14px;
    }
    .tab-btn:not(.active) {
      background-color: #ece9d8;
      border-color: #ece9d8;
    }
    .tab-btn:not(.active):hover {
      background-color: #dfdbcf;
    }

    .profile-card {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .profile-card:hover {
      transform: scale(1.08);
    }
    .profile-card:hover .profile-img {
      border-color: #fff;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .toast-anim {
      animation: slideIn 0.3s ease-out forwards;
    }

    .sa-table th { background-color: #d2cbbb; border: 1px solid #716f64; padding: 8px; text-align: left; }
    .sa-table td { border: 1px solid #a9a9a9; padding: 8px; background-color: white; }

    .icon-picker-btn {
      border: 2px solid transparent;
      transition: all 0.2s;
    }
    .icon-picker-btn.selected {
      border-color: #0058e6;
      background-color: #e6f0ff;
    }

    @media print {
      @page { margin: 0; }
      
      body * { visibility: hidden; }
      body { background-color: white; margin: 0; }
      .xp-desktop { background-color: white; padding: 0; }
      .xp-window { border: none; box-shadow: none; background: white; }
      .xp-panel { border: none; background: white; }
      
      body:not(.printing-monthly) #print-area, body:not(.printing-monthly) #print-area * { visibility: visible; }
      body:not(.printing-monthly) #print-area { 
        position: absolute; left: 0; top: 0; width: 100%; 
        padding: 1.5cm 1cm !important; box-sizing: border-box;
      }
      
      body.printing-monthly .hide-on-monthly-print { display: none !important; }
      body.printing-monthly .monthly-print-only { 
        display: block !important; position: absolute; left: 0; top: 0; width: 100%; 
        padding: 1.5cm 1cm !important; box-sizing: border-box;
      }
      body.printing-monthly .monthly-print-only * { visibility: visible; }
      
      .no-print { display: none !important; }
      .print-table th { background-color: #f3f4f6 !important; -webkit-print-color-adjust: exact; }
      tr.bg-gradient-to-r.from-\\[\\#e2e8f0\\] { background-color: #e2e8f0 !important; background-image: none !important; -webkit-print-color-adjust: exact; }
      tr.bg-gradient-to-r.from-white { background-color: #ffffff !important; background-image: none !important; -webkit-print-color-adjust: exact; }
    }
  </style>
</head>
<body class="xp-desktop p-2 md:p-4 flex justify-center items-start overflow-x-hidden">

  <!-- Toast Notifikasi -->
  <div id="toast" class="fixed top-4 right-4 z-50 bg-[#008000] text-white px-4 py-3 rounded-lg border-2 border-white shadow-lg flex items-center font-bold text-sm no-print hidden toast-anim max-w-[90vw]">
    <i data-lucide="check-circle-2" class="w-5 h-5 mr-2 shrink-0"></i>
    <span id="toast-msg">Mesej Berjaya</span>
  </div>

  <!-- SKRIN LOG MASUK -->
  <div id="login-screen" class="w-full flex flex-col items-center justify-center min-h-[80vh] relative pt-8">
    <div class="text-center mb-10">
      <div id="login-date-display" class="text-sm md:text-base font-bold text-yellow-300 drop-shadow-md mb-2 tracking-wide uppercase"></div>
      <h1 class="text-2xl md:text-4xl font-bold text-white mb-3 leading-tight px-2" style="text-shadow: 2px 2px 4px rgba(0,0,0,0.6);">Sistem Pengurusan Kalendar & Aktiviti</h1>
      <h2 class="text-lg md:text-2xl text-slate-200 font-medium" style="text-shadow: 1px 1px 3px rgba(0,0,0,0.5);">Pilih Profil Akses</h2>
    </div>

    <div id="profile-grid" class="flex flex-wrap justify-center gap-6 md:gap-12 max-w-5xl px-4 z-10 mb-8">
      <!-- Dijana oleh JS -->
    </div>
    
    <div class="mt-4 z-10">
      <button onclick="openProfileMenu('superadmin')" class="flex items-center gap-2 text-slate-200 hover:text-white bg-black/20 hover:bg-black/40 px-5 py-2.5 rounded-full backdrop-blur-sm transition-all border border-transparent hover:border-slate-400 shadow-sm">
        <i data-lucide="shield" class="w-5 h-5 text-red-400"></i>
        <span class="text-sm font-bold tracking-wide">Akses Super-Admin</span>
      </button>
    </div>

    <div class="absolute bottom-4 text-xs font-semibold text-slate-300 drop-shadow">Versi 1.1.0</div>
  </div>

  <!-- MODAL SUB-MENU LOGIN -->
  <div id="profile-auth-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
    <div class="xp-window w-full max-w-sm flex flex-col shadow-[4px_4px_15px_rgba(0,0,0,0.8)] relative animate-[slideIn_0.2s_ease-out]">
      <button onclick="closeProfileMenu()" class="absolute top-2 right-2 text-white hover:text-red-200 z-10 transition-colors">
        <i data-lucide="x" class="w-5 h-5"></i>
      </button>

      <div class="xp-titlebar flex-wrap">
        <span class="text-sm flex items-center gap-2"><i data-lucide="lock" class="w-4 h-4"></i> Pengesahan Akses</span>
      </div>

      <div class="p-6 bg-[#ece9d8] rounded-b-[12px] flex flex-col items-center">
        <div class="w-16 h-16 rounded-xl border-2 border-[#003C74] bg-white flex items-center justify-center mb-3 shadow-sm" id="auth-profile-icon-container">
           <i data-lucide="user" class="w-8 h-8 text-[#000080]" id="auth-profile-icon"></i>
        </div>
        <h3 class="text-lg font-bold text-[#000080] text-center" id="auth-profile-name">Nama Profil</h3>
        <p class="text-xs text-[#555] mb-5 text-center px-4" id="auth-profile-dept">Bahagian Profil</p>

        <div id="login-error" class="w-full bg-[#ffebee] border border-[#ffcdd2] text-[#c62828] px-3 py-2 rounded text-xs font-bold flex items-start gap-2 hidden mb-4">
          <span class="w-4 h-4 rounded-full bg-[#d32f2f] text-white flex items-center justify-center text-[10px] shrink-0 mt-0.5">!</span>
          <span id="login-error-msg" class="flex-1"></span>
        </div>

        <div class="w-full" id="auth-pelawat-section">
          <button onclick="executeLogin('viewer')" class="xp-button w-full justify-center font-bold text-[#000080] py-3 text-sm shadow-sm">
            <i data-lucide="eye" class="w-4 h-4"></i> Masuk sebagai Pelawat
          </button>
          <div class="flex items-center gap-3 my-4">
            <div class="h-px bg-[#a9a9a9] flex-1"></div>
            <span class="text-[10px] font-bold text-[#777] uppercase">Kawasan Admin</span>
            <div class="h-px bg-[#a9a9a9] flex-1"></div>
          </div>
        </div>

        <div class="w-full flex flex-col gap-2">
          <label class="text-xs font-bold text-black" id="auth-password-label">Kata Laluan <span class="text-[#888] font-normal">(Bypass dibenarkan)</span>:</label>
          <input type="password" id="auth-pass" placeholder="Taip kata laluan..." class="xp-input w-full py-2.5 text-center" onkeypress="if(event.key === 'Enter') executeLogin('admin')" />
          <button onclick="executeLogin('admin')" class="xp-button w-full justify-center font-bold text-white bg-[#008000] border-[#005000] hover:bg-[#006000] py-2.5 mt-1 shadow-sm">
            <i data-lucide="unlock" class="w-4 h-4"></i> Log Masuk Admin
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- TETINGKAP UTAMA APLIKASI -->
  <div class="xp-window w-full max-w-6xl flex flex-col hide-on-monthly-print hidden max-h-[96vh]" id="main-app-window">
    
    <div class="xp-titlebar flex-wrap gap-2 md:gap-4">
      <div class="flex items-center gap-2 max-w-full overflow-hidden">
        <i data-lucide="calendar" class="w-4 h-4 text-white drop-shadow shrink-0"></i>
        <span class="text-xs md:text-sm tracking-wide truncate" id="app-title-text">Sistem Pengurusan Kalendar & Aktiviti</span>
      </div>
      <div class="text-[10px] md:text-xs font-medium text-white drop-shadow ml-auto shrink-0" id="current-date-display"></div>
    </div>

    <div class="p-2 md:p-4 bg-[#ece9d8] flex-1 overflow-y-auto">
      
      <div id="top-nav-controls" class="flex flex-col md:flex-row justify-between items-center pb-3 md:pb-4 border-b border-[#a9a9a9] mb-3 md:mb-4 gap-3 no-print">
        
        <div class="flex gap-1 flex-wrap justify-center w-full md:w-auto" id="tabs-container">
          <button onclick="changeView('weekly')" id="tab-weekly" class="tab-btn active text-[#0058e6] flex-1 md:flex-none justify-center">
            <i data-lucide="layout-grid" class="w-4 h-4"></i> Mingguan
          </button>
          <button onclick="changeView('matrix')" id="tab-matrix" class="tab-btn text-[#008000] flex-1 md:flex-none justify-center">
            <i data-lucide="file-text" class="w-4 h-4"></i> Laporan
          </button>
          <button onclick="changeView('settings')" id="tab-settings" class="tab-btn text-[#555] flex-1 md:flex-none justify-center">
            <i data-lucide="settings" class="w-4 h-4"></i> Tetapan
          </button>
        </div>

        <div class="flex flex-wrap items-center justify-center gap-2 w-full md:w-auto">
          <div class="flex items-center gap-1 xp-panel p-1 bg-white" id="week-controls">
            <button onclick="handlePrevWeek()" class="xp-button h-8 w-10 p-0" title="Minggu Lepas">
              <i data-lucide="chevron-left" class="w-4 h-4 text-[#000080]"></i>
            </button>
            <button onclick="handleCurrentWeek()" id="btn-current-week-label" class="xp-button h-8 px-3 md:px-5 font-bold text-[#000080] text-[10px] transition-colors">
              MINGGU SEMASA
            </button>
            <button onclick="handleNextWeek()" class="xp-button h-8 w-10 p-0" title="Minggu Depan">
              <i data-lucide="chevron-right" class="w-4 h-4 text-[#000080]"></i>
            </button>
          </div>
          <button onclick="openModal()" id="btn-add-activity" class="xp-button h-8 px-4 font-bold text-white bg-[#008000] border-[#005000] hover:bg-[#006000]">
            <i data-lucide="plus" class="w-4 h-4 text-white"></i> Tambah
          </button>
        </div>
      </div>

      <div id="superadmin-nav" class="hidden pb-3 md:pb-4 border-b border-[#a9a9a9] mb-3 md:mb-4 no-print">
        <div class="flex flex-wrap justify-between items-center gap-2">
          <h2 class="font-bold text-base md:text-lg text-[#000080] flex items-center gap-2">
            <i data-lucide="shield" class="w-5 h-5 text-red-600 shrink-0"></i> <span class="truncate">Panel Super-Admin</span>
          </h2>
          <button onclick="handleLogout()" class="xp-button h-8 font-bold text-white bg-[#e53935] border-[#b71c1c] hover:bg-red-700">
            <i data-lucide="log-out" class="w-4 h-4"></i> Log Keluar
          </button>
        </div>
      </div>

      <!-- Bekas Utama View -->
      <div id="view-container" class="bg-white xp-panel p-1 md:p-2"></div>
    </div>

    <!-- Status bar bawah -->
    <div class="bg-[#ece9d8] border-t border-[#a9a9a9] p-1.5 flex justify-between items-center text-[10px] font-medium text-[#333] shadow-inner rounded-b-[12px] no-print flex-wrap gap-1">
      <div class="flex items-center gap-2 pl-2">
        <span class="text-[#0058e6] font-bold shrink-0">Akses:</span> <span id="status-role-text" class="uppercase font-bold truncate max-w-[150px] md:max-w-xs"></span>
      </div>
      <div class="pr-2 flex items-center gap-3">
        <span id="app-status-text" class="transition-all duration-300 hidden md:inline">Status: Sedia</span>
        <button onclick="handleLogout()" id="footer-logout-btn" class="bg-[#e53935] text-white px-2 py-0.5 rounded flex items-center gap-1 hover:bg-red-600 transition-colors border border-red-800 shrink-0">
          <i data-lucide="log-out" class="w-3 h-3"></i> Keluar
        </button>
      </div>
    </div>
  </div>

  <!-- BEKAS CETAKAN BULANAN -->
  <div id="monthly-print-container" class="monthly-print-only w-full max-w-6xl"></div>

  <!-- MODAL BORANG AKTIVITI -->
  <div id="modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-2 md:p-4 no-print hidden">
    <div class="xp-window w-full max-w-2xl flex flex-col shadow-[4px_4px_15px_rgba(0,0,0,0.6)]">
      <div class="xp-titlebar">
        <span class="text-sm flex items-center gap-2" id="modal-title"></span>
        <button onclick="closeModal()" class="text-white hover:text-red-200 transition-colors md:hidden">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <div class="p-4 md:p-5 bg-[#ece9d8] overflow-y-auto max-h-[75vh]">
        
        <!-- Ralat Konflik -->
        <div id="conflict-error" class="bg-[#ffebee] border border-[#ffcdd2] text-[#c62828] px-3 py-2 rounded mb-4 flex items-start gap-2 hidden shadow-sm">
          <span class="w-4 h-4 rounded-full bg-[#d32f2f] text-white flex items-center justify-center text-[10px] shrink-0 mt-0.5">!</span>
          <div id="conflict-error-msg" class="flex-1 w-full text-xs"></div>
        </div>

        <!-- Checkbox Override Jemputan (Hidden by default) -->
        <div id="guest-override-container" class="hidden bg-[#fff8e1] border border-[#ffe082] px-3 py-2 rounded mb-4 shadow-sm">
          <label class="flex items-start gap-2 cursor-pointer">
            <input type="checkbox" id="form-is-guest" class="mt-0.5 rounded w-4 h-4 text-[#f57f17] focus:ring-[#f57f17]" />
            <div class="flex flex-col">
              <span class="text-xs font-bold text-[#f57f17]">Teruskan sebagai Ahli Jemputan</span>
              <span class="text-[10px] text-[#795548] leading-tight mt-0.5">Bilik ini telah ditempah. Tandakan ini jika anda adalah jemputan (Tempahan asal akan dianggap sebagai Hos/Urusetia bilik tersebut).</span>
            </div>
          </label>
        </div>

        <form id="activityForm" class="space-y-4">
          
          <div class="flex items-center gap-2">
            <input type="checkbox" id="form-isAllDay" onchange="toggleTimeFields()" class="rounded w-4 h-4" /> 
            <label for="form-isAllDay" class="text-xs font-bold text-[#000080] cursor-pointer">Sepanjang Hari / Tiada Waktu Spesifik</label>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 bg-white p-3 rounded-lg border border-[#a9a9a9] shadow-inner">
            <div class="flex flex-col gap-1">
              <label class="text-xs font-bold text-black">Tarikh Mula:</label>
              <input type="date" id="form-startDate" required class="xp-input text-xs w-full py-2 md:py-1.5" />
            </div>
            
            <div class="flex flex-col gap-1">
              <label class="text-xs font-bold text-black">Masa Mula:</label>
              <div class="flex">
                <input type="text" id="form-startTime" readonly onclick="openClockModal('form-startTime')" class="xp-input text-xs w-full py-2 md:py-1.5 cursor-pointer text-center bg-white rounded-r-none border-r-0" placeholder="--:--" />
                <button type="button" id="btn-clock-start" onclick="openClockModal('form-startTime')" class="xp-button-mini px-3 rounded-l-none bg-[#ece9d8] border-l-0 clock-btn"><i data-lucide="clock" class="w-4 h-4 text-[#0058e6]"></i></button>
              </div>
            </div>

            <div class="flex flex-col gap-1">
              <label class="text-xs font-bold text-black">Tarikh Tamat:</label>
              <input type="date" id="form-endDate" required class="xp-input text-xs w-full py-2 md:py-1.5" />
            </div>
            
            <div class="flex flex-col gap-1">
              <label class="text-xs font-bold text-black">Masa Tamat:</label>
              <div class="flex">
                <input type="text" id="form-endTime" readonly onclick="openClockModal('form-endTime')" class="xp-input text-xs w-full py-2 md:py-1.5 cursor-pointer text-center bg-white rounded-r-none border-r-0" placeholder="--:--" />
                <button type="button" id="btn-clock-end" onclick="openClockModal('form-endTime')" class="xp-button-mini px-3 rounded-l-none bg-[#ece9d8] border-l-0 clock-btn"><i data-lucide="clock" class="w-4 h-4 text-[#0058e6]"></i></button>
              </div>
            </div>
          </div>

          <div class="flex flex-col gap-1">
            <label class="text-xs font-bold text-black">Mesyuarat / Program:</label>
            <input type="text" id="form-program" required class="xp-input text-xs w-full py-2 md:py-1.5" placeholder="Contoh: Mesyuarat Pengurusan" />
          </div>

          <div class="flex flex-col gap-1">
            <label class="text-xs font-bold text-black">Nama Pengerusi <span class="font-normal text-[#555]">(Pilihan)</span>:</label>
            <input type="text" id="form-chairman" class="xp-input text-xs w-full py-2 md:py-1.5" placeholder="Contoh: Pengarah Kanan..." />
          </div>

          <div class="flex flex-col gap-1">
            <label class="text-xs font-bold text-black">Tempat Lokasi:</label>
            <select id="form-location" required class="xp-input text-xs w-full py-2 md:py-1.5 cursor-pointer" onchange="toggleCustomLocation()">
              <!-- Dijana oleh JS -->
            </select>
            <!-- Input khas jika "Lain-lain" dipilih -->
            <div id="form-custom-location-container" class="hidden mt-1.5">
              <input type="text" id="form-custom-location" class="xp-input text-xs w-full py-2 md:py-1.5 border-blue-400" placeholder="Sila nyatakan lokasi terperinci..." />
            </div>
          </div>

          <div class="flex flex-col gap-1">
            <label class="text-xs font-bold text-black">Pegawai / Staf <span class="font-normal text-[#555]">(Baris baharu setiap nama)</span>:</label>
            <textarea id="form-officers" rows="2" required class="xp-input text-xs w-full resize-none py-2 md:py-1.5"></textarea>
          </div>
          
          <div class="flex flex-col gap-1">
            <label class="text-xs font-bold text-black">Catatan Tambahan <span class="font-normal text-[#555]">(Pilihan)</span>:</label>
            <textarea id="form-notes" rows="2" class="xp-input text-xs w-full resize-none py-2 md:py-1.5"></textarea>

    // MENDAPATKAN ISNIN MINGGU SEMASA SEBAGAI LALAI
    function getStartOfWeek(date) {
      const d = new Date(date);
      d.setHours(0, 0, 0, 0); 
      const day = d.getDay();
      const diff = d.getDate() - day + (day === 0 ? -6 : 1); 
      return new Date(d.setDate(diff));
    }
    
    let baseDate = getStartOfWeek(new Date());
    let printMonth = `${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}`;
    
    let editingId = null;
    let editingSAUserId = null;

    let impersonatingFromSA = false;
    let statusTimeout = null;

    const dayNamesList = ['Ahad', 'Isnin', 'Selasa', 'Rabu', 'Khamis', 'Jumaat', 'Sabtu'];
    const monthNamesList = ['JAN', 'FEB', 'MAC', 'APR', 'MEI', 'JUN', 'JUL', 'OGO', 'SEP', 'OKT', 'NOV', 'DIS'];

    window.initAppFromDB = async () => {
      setAppStatus('Memuat turun data dari pangkalan...', 'normal');
      initClockMarkers();
      populateLocationDropdown();

      try {
        if (window.dbAPI) {
          const dbUsers = await window.dbAPI.getUsers();
          if (dbUsers && dbUsers.length > 0) users = dbUsers; 
          else if (dbUsers && dbUsers.length === 0) for (const u of users) await window.dbAPI.saveUser(u);

          const dbActs = await window.dbAPI.getActivities();
          if (dbActs && dbActs.length > 0) {
            activities = dbActs.map(a => {
              if(!a.startDate) a.startDate = a.date;
              if(!a.endDate) a.endDate = a.date;
              return a;
            });
          } else if (dbActs && dbActs.length === 0) {
            for (const a of activities) await window.dbAPI.saveActivity(a);
          }
        }
        setAppStatus('Sedia', 'normal');
      } catch(e) {
        console.error("Firebase Error:", e);
        setAppStatus('Gagal menyambung ke Pelayan DB (Menggunakan Mod Tempatan)', 'error');
      }
      
      updateCurrentDateDisplay();
      renderProfileGrid();
      lucide.createIcons();
    };

    // --- FUNGSI JAM ANALOG ---
    function initClockMarkers() {
      const container = document.getElementById('clock-markers');
      if(!container) return;
      let html = '';
      for(let i=1; i<=12; i++) {
          const angle = i * 30;
          html += `<div class="absolute inset-0 flex justify-center" style="transform: rotate(${angle}deg); padding-top: 6px;">
                     <div style="transform: rotate(-${angle}deg); font-size: 13px; color: #003C74;" class="font-extrabold">${i}</div>
                   </div>`;
      }
      container.innerHTML = html;
    }

    function openClockModal(targetId) {
      if (document.getElementById('form-isAllDay').checked) return; // Terbatal jika mod "Sepanjang Hari"

      currentClockTarget = targetId;
      let val = document.getElementById(targetId).value;
      if(!val) {
          const now = new Date();
          val = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
      }
      document.getElementById('clock-time-input').value = val;
      updateClockHands(val);
      document.getElementById('clock-modal').classList.remove('hidden');
    }

    function closeClockModal() {
      document.getElementById('clock-modal').classList.add('hidden');
    }

    function updateClockHands(timeStr) {
      if(!timeStr) return;
      const [h, m] = timeStr.split(':').map(Number);
      const hAngle = (h % 12) * 30 + (m / 2);
      const mAngle = m * 6;
      document.getElementById('hand-h').style.transform = `rotate(${hAngle}deg)`;
      document.getElementById('hand-m').style.transform = `rotate(${mAngle}deg)`;
    }

    function applyClockTime() {
      const val = document.getElementById('clock-time-input').value;
      if (!val) return alert("Sila masukkan masa yang sah.");
      
      document.getElementById(currentClockTarget).value = val;

      if (currentClockTarget === 'form-startTime') {
         handleAutoEndTime(val);
      }

      closeClockModal();
    }

    function handleAutoEndTime(startTimeStr) {
      if(!startTimeStr) return;
      let [h, m] = startTimeStr.split(':').map(Number);
      h += 2;
      let addDay = false;
      if (h >= 24) {
          h %= 24;
          addDay = true;
      }
      document.getElementById('form-endTime').value = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;

      if (addDay) {
          let sDate = document.getElementById('form-startDate').value;
          if (sDate) {
              let d = new Date(sDate);
              d.setDate(d.getDate() + 1);
              document.getElementById('form-endDate').value = d.toISOString().split('T')[0];
          }
      } else {
          const sDate = document.getElementById('form-startDate').value;
          const eDate = document.getElementById('form-endDate').value;
          if(!eDate || eDate < sDate) {
             document.getElementById('form-endDate').value = sDate;
          }
      }
      
      showToast("Masa tamat di set auto (+2 Jam)");
    }

    // --- FUNGSI LOKASI ---
    function populateLocationDropdown() {
      const select = document.getElementById('form-location');
      if(!select) return;
      select.innerHTML = meetingRooms.map(r => `<option value="${r}">${r}</option>`).join('');
    }

    function toggleCustomLocation() {
      const locSelect = document.getElementById('form-location');
      const customLocContainer = document.getElementById('form-custom-location-container');
      if (locSelect.value === 'Lain-lain / Luar Kawasan') {
        customLocContainer.classList.remove('hidden');
      } else {
        customLocContainer.classList.add('hidden');
      }
    }

    // --- FUNGSI UTAMA LAIN ---
    function updateCurrentDateDisplay() {
      const d = new Date();
      const dayStr = dayNamesList[d.getDay()];
      const dateStr = d.getDate();
      const monthStr = ['JAN', 'FEB', 'MAC', 'APR', 'MEI', 'JUN', 'JUL', 'OGO', 'SEP', 'OKT', 'NOV', 'DIS'][d.getMonth()];
      const yearStr = d.getFullYear();
      const display = `${dayStr.toUpperCase()}, ${dateStr} ${monthStr} ${yearStr}`;
      
      const el = document.getElementById('current-date-display');
      if (el) el.innerText = display;

      const loginDateEl = document.getElementById('login-date-display');
      if (loginDateEl) loginDateEl.innerText = display;
    }

    function setAppStatus(msg, type = 'normal') {
      const el = document.getElementById('app-status-text');
      if(!el) return;
      clearTimeout(statusTimeout);
      
      if(type === 'success') {
        el.innerHTML = `<span class="text-[#008000] font-bold flex items-center gap-1"><i data-lucide="check-circle-2" class="w-3 h-3"></i> ${msg}</span>`;
      } else if (type === 'error') {
        el.innerHTML = `<span class="text-[#d32f2f] font-bold flex items-center gap-1"><i data-lucide="alert-triangle" class="w-3 h-3"></i> ${msg}</span>`;
      } else {
        el.innerHTML = `Status: ${msg}`;
      }
      lucide.createIcons();

      if(type !== 'normal') {
        statusTimeout = setTimeout(() => { setAppStatus('Sedia', 'normal'); }, 5000);
      }
    }

    function renderProfileGrid() {
      const grid = document.getElementById('profile-grid');
      const activeUsers = users.filter(u => u.isActive);
      
      let html = '';

      activeUsers.forEach(u => {
        html += `
          <div onclick="openProfileMenu('${u.id}')" class="profile-card flex flex-col items-center gap-3 cursor-pointer group">

      grid.innerHTML = html;
      lucide.createIcons();

      tempAuthUserId = userId;
      document.getElementById('login-error').classList.add('hidden');
      document.getElementById('auth-pass').value = '';

      const pelawatSection = document.getElementById('auth-pelawat-section');
      const profileName = document.getElementById('auth-profile-name');
      const profileDept = document.getElementById('auth-profile-dept');
      const iconContainer = document.getElementById('auth-profile-icon-container');

        profileDept.innerText = "Mod Keselamatan Tertinggi";

        passwordLabel.innerHTML = `Kata Laluan <span class="text-[#888] font-normal">(Taip 'admin' atau biar kosong)</span>:`;
      } else {
        const user = users.find(u => u.id === userId);
        pelawatSection.classList.remove('hidden');
        profileName.innerText = user.username;
        profileName.className = "text-lg font-bold text-[#000080] text-center";
        profileDept.innerText = user.departmentName;
        iconContainer.innerHTML = `<i data-lucide="${user.icon || 'user'}" class="w-8 h-8 text-[#000080]"></i>`;
        iconContainer.className = "w-16 h-16 rounded-xl border-2 border-[#003C74] bg-white flex items-center justify-center mb-3 shadow-sm";

      }

      document.getElementById('profile-auth-modal').classList.remove('hidden');
      lucide.createIcons();
      setTimeout(()=> document.getElementById('auth-pass').focus(), 100);
    }

    function closeProfileMenu() {
      document.getElementById('profile-auth-modal').classList.add('hidden');
      tempAuthUserId = null;
    }

    function showLoginError(msg) {
      document.getElementById('login-error-msg').innerText = msg;
      document.getElementById('login-error').classList.remove('hidden');
    }

    function executeLogin(role) {
      document.getElementById('login-error').classList.add('hidden');
      const pass = document.getElementById('auth-pass').value;
      
      impersonatingFromSA = false;
      document.getElementById('footer-logout-btn').innerHTML = `<i data-lucide="log-out" class="w-3 h-3"></i> Keluar`;

      if (tempAuthUserId === 'superadmin') {
        if (pass === 'admin' || pass === '') {
          currentUserRole = 'superadmin';
          currentUserId = null;
          
          document.getElementById('status-role-text').innerText = 'SUPER ADMIN';
          document.getElementById('profile-auth-modal').classList.add('hidden');
          document.getElementById('login-screen').classList.add('hidden');
          
          document.getElementById('main-app-window').classList.remove('hidden');
          document.getElementById('top-nav-controls').classList.add('hidden');
          document.getElementById('superadmin-nav').classList.remove('hidden');
          document.getElementById('footer-logout-btn').classList.add('hidden');

          viewMode = 'superadmin';
          renderApp();
          return;
        } else {
          return showLoginError('Kata Laluan Super-Admin Salah!');
        }
      }

      const user = users.find(u => u.id === tempAuthUserId);
      if (role === 'admin') {
        if (user.password && user.password !== '' && pass !== user.password) {
           return showLoginError('Kata laluan salah. Sila cuba lagi.');
        }
      }
      
      currentUserId = tempAuthUserId;
      currentUserRole = role;
      
      document.getElementById('status-role-text').innerText = role === 'admin' ? `Admin (${user.username})` : `Penonton (${user.username})`;
      
      document.getElementById('profile-auth-modal').classList.add('hidden');
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('main-app-window').classList.remove('hidden');
      
      document.getElementById('top-nav-controls').classList.remove('hidden');
      document.getElementById('superadmin-nav').classList.add('hidden');
      document.getElementById('footer-logout-btn').classList.remove('hidden');

      viewMode = 'weekly';
      renderApp();
    }

    function handleLogout() {
      if (impersonatingFromSA) {
        impersonatingFromSA = false;
        currentUserRole = 'superadmin';
        currentUserId = null;
        
        document.getElementById('status-role-text').innerText = 'SUPER ADMIN';
        document.getElementById('top-nav-controls').classList.add('hidden');
        document.getElementById('superadmin-nav').classList.remove('hidden');
        document.getElementById('footer-logout-btn').classList.add('hidden');
        
        viewMode = 'superadmin';
        renderApp();
        return;
      }

      currentUserRole = null;
      currentUserId = null;
      tempAuthUserId = null;
      
      document.getElementById('main-app-window').classList.add('hidden');
      document.getElementById('login-screen').classList.remove('hidden');
      document.getElementById('profile-grid').classList.remove('hidden');
      
      renderProfileGrid(); 
    }

      const user = users.find(u => u.id === userId);
      if(!user) return;

      currentUserId = userId;
      currentUserRole = 'admin';

    }

    function formatTimeDisplay(time24) {
      if (!time24) return '';
      const parts = time24.split(':');
      let h = parseInt(parts[0], 10);
      const mStr = parts[1];
      let period = 'pg';
      if (h >= 12) {
        if (h === 12) period = 'tgh';
        else if (h < 19) period = 'ptg';
        else period = 'mlm';
      }
      const h12 = h % 12 || 12;
      return `${h12}:${mStr} ${period}`;
    }

    function getShortDate(dStr) {
        if(!dStr) return '';
        const parts = dStr.split('-');
        if(parts.length === 3) return `${parts[2]}/${parts[1]}`;
        return dStr;
    }

    function getDisplayDateTime(act, isMatrix = false) {
      let sDate = act.startDate || act.date;
      let eDate = act.endDate || act.date;

      if (act.isAllDay) {
          if (sDate !== eDate) {
              return isMatrix 
                ? `Spjng Hari\n(${getShortDate(sDate)} - ${getShortDate(eDate)})` 
                : `Spjng Hari (${getShortDate(sDate)} - ${getShortDate(eDate)})`;
          }
          return 'Sepanjang Hari';
      }
      
      const s = formatTimeDisplay(act.startTime);
      const e = formatTimeDisplay(act.endTime);
      
      const joiner = isMatrix ? ' -\n' : ' - ';

      if (sDate !== eDate) {
          return `${s} (${getShortDate(sDate)})${joiner}${e} (${getShortDate(eDate)})`;
      }
      
      if (s && e) {
          return `${s}${joiner}${e}`;
      }
      return s || e || '-';
    }

    function timeToMinutes(timeStr) {
      if (!timeStr) return null;
      const parts = timeStr.split(':');
      return parseInt(parts[0], 10) * 60 + parseInt(parts[1], 10);
    }

    function getDaysOfWeek(startDate) {
      const days = [];
      const start = new Date(startDate);
      const day = start.getDay();
      const diff = start.getDate() - day + (day === 0 ? -6 : 1);
      start.setDate(diff);

      for (let i = 0; i < 7; i++) {
        const d = new Date(start);
        d.setDate(start.getDate() + i);
        const dateStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        days.push({
          dateStr, dayName: dayNamesList[d.getDay()],
          displayDate: `${d.getDate()} ${monthNamesList[d.getMonth()]}`,
          isWeekend: d.getDay() === 0 || d.getDay() === 6
        });
      }
      return days;
    }

    function getDaysOfMonth(year, monthIndex) {
      const days = [];
      const date = new Date(year, monthIndex, 1);
      while (date.getMonth() === monthIndex) {
        const dateStr = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        days.push({
          dateStr, dayName: dayNamesList[date.getDay()],
          displayDate: `${date.getDate()} ${monthNamesList[date.getMonth()]}`,
          isWeekend: date.getDay() === 0 || date.getDay() === 6
        });
        date.setDate(date.getDate() + 1);
      }
      return days;
    }

    function escapeHTML(str) {
      if(!str) return '';
      return str.replace(/[&<>'"]/g, tag => ({'&': '&amp;','<': '&lt;','>': '&gt;',"'": '&#39;','"': '&quot;'}[tag]));
    }

    function handleNextWeek() { baseDate = new Date(baseDate.getTime() + 7 * 24 * 60 * 60 * 1000); renderApp(); }

                </h2>
                <div class="flex flex-col gap-4">
                  <div>
                    <label class="font-bold text-xs text-black block mb-1">Nama Bahagian / Unit:</label>
                    <div class="flex flex-wrap md:flex-nowrap gap-2">
                       <input type="text" id="setting-dept" value="${escapeHTML(user.departmentName)}" class="xp-input text-sm w-full font-bold py-2" />
                       <button onclick="updateDepartmentName()" class="xp-button text-[#000080] font-bold shrink-0">Simpan</button>
                    </div>
                  </div>
                  <div>
                    <label class="font-bold text-xs text-black block mb-1">Pilih Ikon Profil:</label>
                    <div class="flex flex-wrap gap-2 p-2 border border-slate-200 rounded-lg bg-slate-50" id="tenant-icon-grid">
                      ${iconHTML}
                    </div>
                  </div>
                </div>
              </div>

              <div class="bg-white p-5 md:p-6 rounded-xl border border-[#a9a9a9] shadow-sm">
                <h2 class="font-bold text-sm text-[#e53935] border-b border-[#a9a9a9] pb-3 mb-4 flex items-center gap-2">
                  <i data-lucide="key" class="w-4 h-4"></i> Keselamatan (Kata Laluan)
                </h2>
                <div class="flex flex-col gap-2">
                  <label class="font-bold text-xs text-black block mb-1">Kata Laluan Baharu:</label>
                  <div class="flex flex-wrap md:flex-nowrap gap-2">
                     <input type="password" id="setting-password" placeholder="Masukkan kata laluan baharu..." class="xp-input text-sm w-full font-bold py-2" />
                     <button onclick="updatePassword()" class="xp-button text-[#000080] font-bold shrink-0">Simpan</button>
                  </div>
                  <p class="text-[10px] text-[#555] font-semibold mt-1 leading-tight">Biarkan kosong jika tidak mahu menggunakan kata laluan (Bypass).</p>
                </div>
              </div>

              <div class="bg-[#ffffe1] p-5 md:p-6 rounded-xl border border-[#a9a9a9] shadow-sm">
                <h2 class="font-bold text-sm text-[#008000] border-b border-[#a9a9a9] pb-3 mb-4 flex items-center gap-2">
                  <i data-lucide="file-text" class="w-4 h-4"></i> Laporan Bulanan
                </h2>
                <div class="flex flex-col gap-4">
                  <label class="font-bold text-xs text-black">Pilih Bulan & Tahun:</label>
                  <div class="flex flex-wrap md:flex-nowrap items-center gap-3">
                    <input type="month" id="setting-month" value="${printMonth}" onchange="updatePrintMonth(this.value)" class="xp-input text-sm font-bold py-1.5 w-full md:w-auto" />
                    <button onclick="handlePrintMonthly()" class="xp-button h-9 font-bold text-[#000080] shadow-sm px-4 w-full md:w-auto justify-center">
                      <i data-lucide="printer" class="w-4 h-4"></i> Jana Laporan PDF
                    </button>
                  </div>
                </div>
              </div>

            </div>
          </div>
        `;
      }
      lucide.createIcons();
    }

    async function updateDepartmentName() { 
      const newName = document.getElementById('setting-dept').value;
      const user = users.find(u => u.id === currentUserId);
      if(user) {
        user.departmentName = newName;
        try {
          if (window.dbAPI) await window.dbAPI.saveUser(user);
          showToast("Data berjaya disimpan");
          renderApp();
        } catch(e) {
          setAppStatus('Gagal menyimpan pangkalan data', 'error');
        }
      }
    }

    async function updatePassword() {
      const newPass = document.getElementById('setting-password').value;
      const user = users.find(u => u.id === currentUserId);
      if(user) {
        user.password = newPass;
        try {
          if (window.dbAPI) await window.dbAPI.saveUser(user);
          showToast("Data berjaya disimpan");
          document.getElementById('setting-password').value = '';
        } catch(e) {
          setAppStatus('Gagal menyimpan pangkalan data', 'error');
        }
      }
    }

    async function selectTenantIcon(iconName) {
      const user = users.find(u => u.id === currentUserId);
      if(user) {
        user.icon = iconName;
        try {
          if (window.dbAPI) await window.dbAPI.saveUser(user);
          const grid = document.getElementById('tenant-icon-grid');
          Array.from(grid.children).forEach(el => {
             if(el.dataset.icon === iconName) el.classList.add('selected');
             else el.classList.remove('selected');
          });
          showToast("Data berjaya disimpan");
        } catch(e) {
          setAppStatus('Gagal menyimpan pangkalan data', 'error');
        }
      }
    }

    function updatePrintMonth(val) { printMonth = val; }

    function handlePrintMonthly() {
      const printContainer = document.getElementById('monthly-print-container');
      const [yStr, mStr] = printMonth.split('-');
      const year = parseInt(yStr, 10);
      const monthIndex = parseInt(mStr, 10) - 1;
      const daysInMonth = getDaysOfMonth(year, monthIndex);
      
      const rangeText = `BULAN ${['JANUARI', 'FEBRUARI', 'MAC', 'APRIL', 'MEI', 'JUN', 'JULAI', 'OGOS', 'SEPTEMBER', 'OKTOBER', 'NOVEMBER', 'DISEMBER'][monthIndex]} ${year}`;
      const myActivities = activities.filter(a => a.userId === currentUserId);

      printContainer.innerHTML = buildMatrixHTML(daysInMonth, myActivities, "Laporan Aktiviti Bulanan", rangeText, false);
      
      document.body.classList.add('printing-monthly');
      lucide.createIcons();
      
      setTimeout(() => {
        window.print();
        document.body.classList.remove('printing-monthly');
      }, 400);
    }

    function showSAError(msg) {
      setAppStatus('Data gagal disimpan', 'error');
      document.getElementById('sa-error-msg').innerHTML = msg;
      document.getElementById('sa-error').classList.remove('hidden');
    }

    function buildSAIconGrid(selectedIcon) {
      return availableIcons.map(ic => `
          <div onclick="selectSAIcon('${ic}')" class="sa-icon-btn w-10 h-10 flex items-center justify-center rounded cursor-pointer hover:bg-slate-200 ${selectedIcon === ic ? 'border-2 border-[#0058e6] bg-[#e6f0ff]' : 'border-2 border-transparent'}" data-icon="${ic}">
             <i data-lucide="${ic}" class="w-6 h-6 text-[#000080]"></i>
          </div>
      `).join('');
    }

    function selectSAIcon(iconName) {
      selectedIconTemp = iconName;
      const grid = document.getElementById('sa-icon-grid');
      Array.from(grid.children).forEach(el => {
         if(el.dataset.icon === iconName) {
           el.className = "sa-icon-btn w-10 h-10 flex items-center justify-center rounded cursor-pointer hover:bg-slate-200 border-2 border-[#0058e6] bg-[#e6f0ff]";
         } else {
           el.className = "sa-icon-btn w-10 h-10 flex items-center justify-center rounded cursor-pointer hover:bg-slate-200 border-2 border-transparent";
         }
      });
    }

    function openSAModal(userId = null) {
      document.getElementById('sa-modal').classList.remove('hidden');
      document.getElementById('sa-error').classList.add('hidden');
      
      if (userId) {
        editingSAUserId = userId;
        const u = users.find(x => x.id === userId);
        document.getElementById('sa-modal-title').innerText = 'Pindaan Profil Setiausaha';
        document.getElementById('sa-username').value = u.username;
        document.getElementById('sa-department').value = u.departmentName;
        document.getElementById('sa-password').value = u.password;
        selectedIconTemp = u.icon || 'user';
      } else {
        editingSAUserId = null;
        document.getElementById('sa-modal-title').innerText = 'Tambah Profil Baharu';
        document.getElementById('sa-username').value = '';
        document.getElementById('sa-department').value = '';
        document.getElementById('sa-password').value = '';
        selectedIconTemp = 'user';
      }

      document.getElementById('sa-icon-grid').innerHTML = buildSAIconGrid(selectedIconTemp);
      lucide.createIcons();
    }

    function closeSAModal() {
      document.getElementById('sa-modal').classList.add('hidden');
      editingSAUserId = null;
    }

    async function saveSAUser() {
      document.getElementById('sa-error').classList.add('hidden');
      const username = document.getElementById('sa-username').value;
      const dept = document.getElementById('sa-department').value;
      const pass = document.getElementById('sa-password').value;

      if(!username || !dept) return showSAError('Nama profil dan bahagian wajib diisi.');

      setAppStatus('Menyimpan ke pangkalan data...', 'normal');
      try {
        if (editingSAUserId) {
          let u = users.find(x => x.id === editingSAUserId);
          u.username = username;
          u.departmentName = dept;
          u.password = pass;
          u.icon = selectedIconTemp;
          if (window.dbAPI) await window.dbAPI.saveUser(u);
          showToast('Data berjaya disimpan');
        } else {
          const newId = 'u' + Date.now();
          const newUser = {
            id: newId,
            username: username,
            departmentName: dept,
            password: pass,
            isActive: true,
            icon: selectedIconTemp
          };
          users.push(newUser);
          if (window.dbAPI) await window.dbAPI.saveUser(newUser);
          showToast('Data berjaya disimpan');
        }
        closeSAModal();
        renderApp();
      } catch(e) {
        showSAError('Ralat Pangkalan Data (Kebenaran disekat?)');
      }
    }

    async function toggleSAUserStatus(id) {
      let u = users.find(x => x.id === id);
      if(u) {
        u.isActive = !u.isActive;
        try {
          if (window.dbAPI) await window.dbAPI.saveUser(u);
          showToast('Data berjaya disimpan');
          renderApp();
        } catch(e) {
          setAppStatus('Gagal menyimpan pangkalan data', 'error');
        }
      }
    }

    let pendingDeleteId = null;

    function deleteSAUser(id) {
      const u = users.find(x => x.id === id);
      document.getElementById('confirm-modal-msg').innerText = `Padam profil ${u.username}?`;
      pendingDeleteId = id;
      document.getElementById('confirm-modal').classList.remove('hidden');
    }

    async function executeDelete() {
      if(pendingDeleteId) {
        try {
          setAppStatus('Memadam profil...', 'normal');
          if (window.dbAPI) await window.dbAPI.deleteUser(pendingDeleteId);
          
          const actsToDelete = activities.filter(a => a.userId === pendingDeleteId);
          if (window.dbAPI) {
            for(let act of actsToDelete) {
              await window.dbAPI.deleteActivity(act.id);
            }
          }

          users = users.filter(x => x.id !== pendingDeleteId);
          activities = activities.filter(a => a.userId !== pendingDeleteId);
          showToast('Data berjaya dipadam');
          pendingDeleteId = null;
          document.getElementById('confirm-modal').classList.add('hidden');
          renderApp();
        } catch(e) {
          setAppStatus('Gagal memadam dari pangkalan data', 'error');
        }
      }
    }

    function cancelDelete() {
      pendingDeleteId = null;
      document.getElementById('confirm-modal').classList.add('hidden');
    }

    function openModal(actId = null, specificDateStr = null) {
      if(currentUserRole !== 'admin') return; 
      
      document.getElementById('conflict-error').classList.add('hidden');
      document.getElementById('guest-override-container').classList.add('hidden');
      document.getElementById('form-is-guest').checked = false;
      
      const formStartDate = document.getElementById('form-startDate');
      const formEndDate = document.getElementById('form-endDate');
      const formStartTime = document.getElementById('form-startTime');
      const formEndTime = document.getElementById('form-endTime');
      const formIsAllDay = document.getElementById('form-isAllDay');
      const formProgram = document.getElementById('form-program');
      const formChairman = document.getElementById('form-chairman');
      const formLocation = document.getElementById('form-location');
      const formCustomLocation = document.getElementById('form-custom-location');
      const formOfficers = document.getElementById('form-officers');
      const formNotes = document.getElementById('form-notes');
      
      const modalTitle = document.getElementById('modal-title');
      const btnDelete = document.getElementById('btn-delete');

      if (actId) {
        editingId = actId;
        const act = activities.find(a => a.id === actId);
        
        modalTitle.innerHTML = `<i data-lucide="edit" class="w-4 h-4"></i> Dialog Pindaan Rekod`;
        btnDelete.classList.remove('hidden');

        formStartDate.value = act.startDate || act.date;
        formEndDate.value = act.endDate || act.date;
        formStartTime.value = act.startTime || '';
        formEndTime.value = act.endTime || '';
        formIsAllDay.checked = act.isAllDay;
        formProgram.value = act.program;
        formChairman.value = act.chairman || '';
        
        if (act.isGuest) {
            document.getElementById('guest-override-container').classList.remove('hidden');
            document.getElementById('form-is-guest').checked = true;
        }
        
        if (meetingRooms.includes(act.location)) {
          formLocation.value = act.location;
          formCustomLocation.value = '';
          document.getElementById('form-custom-location-container').classList.add('hidden');
        } else {
          formLocation.value = 'Lain-lain / Luar Kawasan';
          formCustomLocation.value = act.location;
          document.getElementById('form-custom-location-container').classList.remove('hidden');
        }
        
        formOfficers.value = act.officers;
        formNotes.value = act.notes;
      } else {
        editingId = Date.now().toString();
        
        modalTitle.innerHTML = `<i data-lucide="plus" class="w-4 h-4"></i> Dialog Rekod Baharu`;
        btnDelete.classList.add('hidden');
        
        const weekDays = getDaysOfWeek(baseDate);
        formStartDate.value = specificDateStr || weekDays[0].dateStr;
        formEndDate.value = specificDateStr || weekDays[0].dateStr;
        formStartTime.value = '09:00';
        formEndTime.value = '11:00';
        formIsAllDay.checked = false;
        formProgram.value = '';
        formChairman.value = '';
        formLocation.value = meetingRooms[0];
        formCustomLocation.value = '';
        document.getElementById('form-custom-location-container').classList.add('hidden');
        formOfficers.value = '';
        formNotes.value = '';
      }

      toggleTimeFields();
      document.getElementById('modal').classList.remove('hidden');
      lucide.createIcons();
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
      editingId = null;
    }

    function toggleTimeFields() {
      const isAllDay = document.getElementById('form-isAllDay').checked;
      const sTime = document.getElementById('form-startTime');
      const eTime = document.getElementById('form-endTime');
      const clockBtns = document.querySelectorAll('.clock-btn');
      
      if(isAllDay) {
        sTime.disabled = true;
        eTime.disabled = true;
        sTime.classList.add('bg-slate-200', 'text-slate-400');
        eTime.classList.add('bg-slate-200', 'text-slate-400');
        sTime.value = '';
        eTime.value = '';
        clockBtns.forEach(b => b.disabled = true);
      } else {
        sTime.disabled = false;
        eTime.disabled = false;
        sTime.classList.remove('bg-slate-200', 'text-slate-400');
        eTime.classList.remove('bg-slate-200', 'text-slate-400');
        clockBtns.forEach(b => b.disabled = false);
      }
    }

    function showToast(msg) {
      setAppStatus(msg, 'success');
      const t = document.getElementById('toast');
      document.getElementById('toast-msg').innerText = msg;
      t.classList.remove('hidden');
      t.classList.remove('toast-anim');
      void t.offsetWidth;
      t.classList.add('toast-anim');
      setTimeout(() => { t.classList.add('hidden'); }, 3000);
    }

    function showError(msg) {
      setAppStatus('Data gagal disimpan', 'error');
      // Menggunakan innerHTML supaya tag HTML seperti <b> atau <br> boleh berfungsi
      document.getElementById('conflict-error-msg').innerHTML = msg;
      document.getElementById('conflict-error').classList.remove('hidden');
      document.getElementById('modal').scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function saveActivity() {
      const form = document.getElementById('activityForm');
      if (!form.checkValidity()) {
        form.reportValidity();
        return;
      }

      const isGuestOverride = document.getElementById('form-is-guest').checked;

      const startDateVal = document.getElementById('form-startDate').value;
      const endDateVal = document.getElementById('form-endDate').value;
      const isAllDay = document.getElementById('form-isAllDay').checked;
      const startVal = document.getElementById('form-startTime').value;
      const endVal = document.getElementById('form-endTime').value;
      
      const locationDropdownValue = document.getElementById('form-location').value;
      let locationVal = locationDropdownValue;
      
      if (locationDropdownValue === 'Lain-lain / Luar Kawasan') {
        locationVal = document.getElementById('form-custom-location').value.trim();
        if (!locationVal) return showError('RALAT: Sila nyatakan lokasi terperinci!');
      }
      
      document.getElementById('conflict-error').classList.add('hidden');

      if (!startDateVal || !endDateVal) return showError('RALAT: Sila masukkan tarikh mula dan tamat!');
      if (startDateVal > endDateVal) return showError('RALAT: Tarikh tamat tidak boleh sebelum tarikh mula!');

      const parseTS = (dStr, tStr, isEnd) => {
        if (isEnd && (!tStr || tStr.trim() === '')) return new Date(`${dStr}T23:59:59`).getTime();
        let t = tStr || '00:00';
        if (t.split(':').length === 2) t += ':00'; 
        return new Date(`${dStr}T${t}`).getTime();
      };

      if (!isAllDay && !startVal) return showError('RALAT: Sila masukkan masa mula!');

      const newStartTS = isAllDay ? parseTS(startDateVal, null, false) : parseTS(startDateVal, startVal, false);
      const newEndTS = isAllDay ? parseTS(endDateVal, null, true) : parseTS(endDateVal, endVal, true);

      if (!isAllDay && newStartTS >= newEndTS) {
        return showError('RALAT: Masa tamat mestilah selepas masa mula!');
      }

      const otherActivities = activities.filter(a => a.id !== editingId);
      
      for (let act of otherActivities) {
        const actStartD = act.startDate || act.date;
        const actEndD = act.endDate || act.date;
        
        const extStartTS = act.isAllDay ? parseTS(actStartD, null, false) : parseTS(actStartD, act.startTime, false);
        const extEndTS = act.isAllDay ? parseTS(actEndD, null, true) : parseTS(actEndD, act.endTime, true);
        
        const isOverlapping = (newStartTS < extEndTS) && (newEndTS > extStartTS);
        
        if (isOverlapping) {
           if (locationDropdownValue !== 'Lain-lain / Luar Kawasan' && act.location === locationVal) {
              if (!isGuestOverride) {
                  const conflictUser = users.find(u => u.id === act.userId);
                  const deptName = conflictUser ? conflictUser.departmentName : 'Bahagian Lain';
                  
                  // Tunjukkan amaran dan juga paparkan Checkbox Jemputan
                  document.getElementById('guest-override-container').classList.remove('hidden');
                  
                  return showError(`
                    <div class="flex flex-col gap-1 w-full">
                      <span class="text-xs md:text-sm uppercase tracking-wider font-extrabold text-red-700">Slot Penuh!</span>
                      <span class="text-[10px] md:text-xs leading-tight">Bilik mesyuarat ini telah ditempah. Jika anda hadir sebagai tetamu, tandakan amaran di bawah dan klik simpan semula.</span>
                      <div class="bg-white p-2 rounded border border-red-200 mt-1 shadow-sm w-full">
                        <p class="text-[9px] md:text-[10px] text-black font-semibold mb-1 border-b border-slate-100 pb-1">Tempahan Sedia Ada (Hos/Urusetia):</p>
                        <ul class="text-[10px] md:text-[11px] text-slate-700 space-y-0.5">
                          <li><b class="text-black">Oleh:</b> ${escapeHTML(deptName)}</li>
                          <li><b class="text-black">Program:</b> ${escapeHTML(act.program)}</li>
                          <li><b class="text-black">Waktu:</b> ${getDisplayDateTime(act)}</li>
                        </ul>
                      </div>
                    </div>
                  `);
              }
           }
        }
      }

      const dateObj = new Date(startDateVal);
      const updatedData = {
        id: editingId,
        userId: currentUserId,
        date: startDateVal, // fallback untuk kod legacy matriks jika perlu
        startDate: startDateVal,
        endDate: endDateVal,
        day: dayNamesList[dateObj.getDay()],
        startTime: isAllDay ? '' : startVal,
        endTime: isAllDay ? '' : endVal,
        isAllDay: isAllDay,
        program: document.getElementById('form-program').value,
        chairman: document.getElementById('form-chairman').value,
        location: locationVal,
        officers: document.getElementById('form-officers').value,
        notes: document.getElementById('form-notes').value,
        isGuest: isGuestOverride
      };

      const isExisting = activities.find(a => a.id === editingId);
      
      setAppStatus('Menyimpan ke pangkalan data...', 'normal');
      try {
        if (window.dbAPI) await window.dbAPI.saveActivity(updatedData);

        if (isExisting) {
          activities = activities.map(a => a.id === editingId ? updatedData : a);
        } else {
          activities.push(updatedData);
          activities.sort((a, b) => new Date(a.startDate || a.date) - new Date(b.startDate || b.date));
        }
        showToast('Data berjaya disimpan');
        closeModal();
        renderApp();
      } catch(e) {
        console.error("Save Error:", e);
        showError('Pangkalan data ralat (Semak kebenaran Rules DB anda)');
      }
    }

    async function handleDelete() {
      setAppStatus('Memadam data...', 'normal');
      try {
        if (window.dbAPI) await window.dbAPI.deleteActivity(editingId);
        activities = activities.filter(a => a.id !== editingId);
        showToast('Data berjaya dipadam');
        closeModal();
        renderApp();
      } catch (e) {
        console.error("Delete Error:", e);
        setAppStatus('Gagal memadam dari pangkalan data', 'error');
      }
    }

  </script>
